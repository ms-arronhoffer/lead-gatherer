services:
  redis:
    image: redis:7-alpine
    container_name: leadgen-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    container_name: leadgen-searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://localhost:8081/"
      SEARXNG_SECRET: "${SEARXNG_SECRET:-change-me-please}"
      INSTANCE_NAME: "leadgen-searxng"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadgen-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/leadgen.db"
      REDIS_URL: "redis://redis:6379/0"
      SEARXNG_URL: "${SEARXNG_URL:-http://searxng:8080}"
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/.env:/app/.env:ro
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadgen-frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8000"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    command: node node_modules/vite/bin/vite.js --host 0.0.0.0
