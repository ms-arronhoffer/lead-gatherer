services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadgen-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/leadgen.db"
    volumes:
      - ./backend/app:/app/app
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadgen-frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8000"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    command: node node_modules/vite/bin/vite.js --host 0.0.0.0
